<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
    <script>
        function ChangeOrder(event){
            event.preventDefault();

            const input = document.getElementById("ticket_order_input");
            const button = document.getElementById("ticket_order_btn");

            if (input.value == "ascending"){
                input.value = "descending";
                button.innerHTML = "Descending";
            } else {
                input.value = "ascending";
                button.innerHTML = "Ascending";
            }

            document.getElementById("orderForm").submit();
        }
        function showErrorPopup(message) {
            const popup = document.getElementById("popupLabel");
            popup.textContent = message;
            popup.classList.add("show");

            // Hide after 2 seconds
            setTimeout(() => {
                popup.classList.remove("show");
            }, 2000);
        }
        function showWarningPopup(message) {
            const warningpopup = document.getElementById("popupWarningLabel");
            warningpopup.textContent = message;
            warningpopup.classList.add("show");

            // Hide after 2 seconds
            setTimeout(() => {
                warningpopup.classList.remove("show");
            }, 2000);
        }
        window.onload = function() {
            {% if errorMessage %}
                showErrorPopup("{{ errorMessage }}");
            {% endif %}
            {% if warning %}
                showWarningPopup("{{ warning }}");
            {% endif %}
        };
    </script>
</head>
    <body>
        <div>
            <label id="popupLabel"></label>
        </div>
        <div>
            <label id="popupWarningLabel"></label>
        </div>

        <div class="button-container">
            <button id="main-button">☰</button>
            <div class="slide-buttons" id="slide-buttons">
                <button style="font-size: 25px;" onclick="window.location.href='/'" class="slide-btn">⌂</button>
                <button onclick="window.location.href='/scan_tickets'" class="slide-btn">Scan Tickets</button>
                <button onclick="window.location.href='/books_managment'" class="slide-btn">Books Management</button>
                <button onclick="window.location.href='/edit_reports'" class="slide-btn">Edit Reports</button>
            </div>
        </div>

        <script>
            const mainBtn = document.getElementById("main-button");
            const slideBtns = document.getElementById("slide-buttons");

            mainBtn.addEventListener("click", () => {
                slideBtns.classList.toggle("show");
                const isVisible = slideBtns.classList.contains("show");

                if (isVisible){
                    mainBtn.innerText = "➤";
                }else{
                  mainBtn.innerText = "☰";  
                }
            });
        </script>        

        <!-- <div class="header-bar">
            <div id="Navigation_Buttons">
                <button onclick="window.location.href='/scan_tickets'">Scan Tickets</button>
                <button onclick="window.location.href='/books_managment'">Books Management</button>            
                <button onclick="window.location.href='/'">Home</button>
            </div>
        </div> -->

        <div id="settings_container">
            <div id="title">Settings</div>
            <table id="settings_table">
                <tr>
                    <td>
                        <form method="post" action="/settings" id="orderForm">
                            <label>Ticket Order:</label>
                            <select name="ticket_order" id="ticket_order_select" onchange="document.getElementById('orderForm').submit();">
                                <option value="ascending" {% if counting_order == 'ascending' %}selected{% endif %}>Ascending</option>
                                <option value="descending" {% if counting_order == 'descending' %}selected{% endif %}>Descending</option>
                            </select>
                        </form>
                    </td>
                    <td>
                        <form method="post" action="/settings" id="invoice_output_path">
                            <label>Invoice Output Path:</label>
                            <input type="text" id="invoice_output_path_input" name="outputPath" placeholder="e.g., C:\Users\You\Documents\OutputFolder" value="{{ invoice_output_path }}" onchange="document.getElementById('invoice_output_path').submit();">
                            
                        </form>
                    <td>
                </tr>
                <tr>
                    <td>
                        <form method="post" action="/settings" id="businessPortfolioForm">
                            <label>Business Portfolio:</label>
                            <label>Business Name: <input type="text" id="business_name" name="BusinessName" placeholder="e.g. Scuttlebutts Liquors" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Name"] %} value="{{ business_Info["Name"] }}" {% endif %}></label>
                            <label>Business Address: <input type="text" id="business_address" name="BusinessAddress" placeholder="123 Main St, Springfield, IL 62704" pattern="^[0-9]+[\s]+[A-Za-z\s]+[,]{0,1}[\s]*[A-Za-z\s]+$" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Address"] %} value="{{ business_Info["Address"] }}" {% endif %}></label>
                            <label>Business Phone: <input type="tel" id="business_phone" pattern="^\d{10}$" placeholder="Enter 10-digit number" name="BusinessPhone" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Phone"] %} value="{{ business_Info["Phone"] }}" {% endif %}></label>
                            <label>Business Email: <input type="text" id="business_email" name="BusinessEmail" placeholder="e.g. johndoe@example.com" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Email"] %} value="{{ business_Info["Email"] }}" {% endif %}></label>
                        </form>
                    </td>
                </tr>
            </table>
        </div>
    </body>
</html>
