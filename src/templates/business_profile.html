{% extends "navButton.html" %}
{% block title %}Business Profile{% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{{ url_for('static', filename='settings.css') }}">
{% endblock %}
    
{% block extra_js %}
    <script>
        function showErrorPopup(message) {
            const popup = document.getElementById("popupLabel");
            popup.textContent = message;
            popup.classList.add("show");

            // Hide after 2 seconds
            setTimeout(() => {
                popup.classList.remove("show");
            }, 2000);
        }
        window.onload = function() {
            {% if errorMessage %}
                showErrorPopup("{{ errorMessage }}");
            {% endif %}
        };
    </script>
{% endblock %}

{% block content %}
        <div>
            <label id="popupLabel"></label>
        </div>
        <div>
            <label id="popupWarningLabel"></label>
        </div>


        <div id="profile_container">
            <div id="title">Business Profile</div>
            <table id="profile_table">
                <tr>
                    <td>
                        <form method="post" action="/business_profile" id="businessPortfolioForm">
                            <label>Portfolio:</label>
                            <label>Name: <input type="text" id="business_name" name="BusinessName" placeholder="e.g. Scuttlebutts Liquors" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Name"] %} value="{{ business_Info["Name"] }}" {% endif %}></label>
                            <label>Address: <input type="text" id="business_address" name="BusinessAddress" placeholder="123 Main St, Springfield, IL 62704"  onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Address"] %} value="{{ business_Info["Address"] }}" {% endif %}></label>
                            <label>Phone: <input type="tel" id="business_phone"  placeholder="Enter 10-digit number" name="BusinessPhone" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Phone"] %} value="{{ business_Info["Phone"] }}" {% endif %}></label>
                            <label>Email: <input type="text" id="business_email" name="BusinessEmail" placeholder="e.g. johndoe@example.com" onchange="document.getElementById('businessPortfolioForm').submit();"{% if business_Info["Email"] %} value="{{ business_Info["Email"] }}" {% endif %}></label>
                            <button type="submit">Save</button>
                        </form>
                    </td>
                </tr>
            </table>
        </div>
{% endblock %}
