<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Scan Tickets Page</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='scan_tickets.css') }}">
    <script>
        function checkLengthAndSubmit() {
            const input = document.getElementById('scanned_code');
            
            const isValid = /^\d{29}$/.test(input.value);

            if (isValid) {
                document.getElementById('scanForm').submit();
            }
        }
    </script>
</head>
<body>
    <h1>Scan Tickets Page</h1>

    <form method="POST" id="scanForm" class="scan-box">
        <label for="scanned_code"><strong>Scan Ticket:</strong></label><br>
        <input type="text"
               name="scanned_code"
               id="scanned_code"
               placeholder="Scan ticket..."
               autofocus
               required
               oninput="checkLengthAndSubmit()">
        <!-- Submit button is hidden since auto-submit is now enabled -->
        <button type="submit" style="display:none;">Submit</button>

        {% if status_message %}
        <div class="status-message">{{ status_message }}</div>
        {% endif %}
    </form>

    <h2>Activated Tickets</h2>
    <table>
        <thead>
            <tr>
                <th>Game #</th>
                <th>Book ID</th>
                <th>Open</th>
                <th>Close</th>
                <th>Sold</th>
            </tr>
        </thead>
        <tbody>
        {% for book in activated_books %}
            <tr class="complete">
                <td>{{ book['GameNumber'] }}</td>
                <td>{{ book['ActiveBookID'] }}</td>
                <td>{{ book['isAtTicketNumber'] }}</td>
                <td>{{ book['1'] }}</td>
                <td>{{ book['2'] }}</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</body>
</html>
