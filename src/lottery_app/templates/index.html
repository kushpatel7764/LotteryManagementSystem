<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lottery Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
  <div class="home-page">

    <div class="home-card">
      <div class="home-brand">
        <div class="brand-icon"><i class="fas fa-ticket-alt"></i></div>
        <span class="brand-name">Lottery Manager</span>
      </div>

      <div class="nav-group">
        <p class="group-label">Main</p>
        <a href="{{ url_for('tickets.scan_tickets') }}" class="nav-item">
          <span class="nav-item-icon"><i class="fas fa-barcode"></i></span>
          <span class="nav-item-text">Scan Tickets</span>
          <i class="fas fa-chevron-right nav-item-arrow"></i>
        </a>
        <a href="{{ url_for('books.books_managment') }}" class="nav-item">
          <span class="nav-item-icon"><i class="fas fa-book"></i></span>
          <span class="nav-item-text">Books Management</span>
          <i class="fas fa-chevron-right nav-item-arrow"></i>
        </a>
        <a href="{{ url_for('reports.edit_reports') }}" class="nav-item">
          <span class="nav-item-icon"><i class="fas fa-edit"></i></span>
          <span class="nav-item-text">Edit Reports</span>
          <i class="fas fa-chevron-right nav-item-arrow"></i>
        </a>
      </div>

      <div class="nav-group">
        <p class="group-label">Administration</p>
        <a href="{{ url_for('settings.settings') }}" class="nav-item">
          <span class="nav-item-icon nav-item-icon--gray"><i class="fas fa-cog"></i></span>
          <span class="nav-item-text">Settings</span>
          <i class="fas fa-chevron-right nav-item-arrow"></i>
        </a>
        <a href="{{ url_for('business_profile.business_profile') }}" class="nav-item">
          <span class="nav-item-icon nav-item-icon--gray"><i class="fas fa-briefcase"></i></span>
          <span class="nav-item-text">Business Profile</span>
          <i class="fas fa-chevron-right nav-item-arrow"></i>
        </a>
      </div>
    </div>

  </div>
</body>
</html>
